<!-- Loading state -->
@if (isLoading) {
  <div class="flex flex-col items-center justify-center py-20 mt-12 space-y-4">
    <div class="w-12 h-12 border-4 border-orange border-t-transparent rounded-full animate-spin"></div>
    <p class="text-navy/60 font-medium">Căutăm cele mai bune oferte pentru tine...</p>
  </div>
}

<!-- Empty state -->
@if (!isLoading && properties.length === 0) {
  <div class="flex flex-col items-center justify-center py-20 mt-12 space-y-4 bg-white/50 rounded-3xl border-2 border-dashed border-navy/10">
    <i class="pi pi-building text-6xl text-navy/20"></i>
    <div class="text-center">
      <h3 class="text-xl font-bold text-navy">Niciun rezultat găsit</h3>
      <p class="text-navy/60">Încearcă să modifici filtrele pentru mai multe opțiuni.</p>
    </div>
  </div>
}

<!-- Results grid -->
@if (!isLoading && properties.length > 0) {
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mt-12">
    @for (property of properties; track property.id) {
      <app-property-card [property]="property" />
    }
  </div>
}
