@if (savedSearches().length > 0) {
  <div class="w-full mt-12">
    <p class="text-xs font-bold text-navy/40 uppercase mb-2">Căutări salvate</p>
    <div class="flex flex-wrap gap-2">
      @for (search of savedSearches(); track search.id) {
        <div class="flex items-center gap-1 bg-gray-50 border border-gray-200 rounded-xl px-3 py-1.5">

          <button type="button" (click)="onApply(search)"
            class="text-sm font-medium text-navy hover:text-orange transition-colors">
            {{ search.name }}
          </button>

          <button type="button" (click)="onDelete(search.id)"
            class="text-gray-300 hover:text-red-400 transition-colors ml-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>

        </div>
      }
    </div>
  </div>
}
