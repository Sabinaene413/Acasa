<nav class="fixed top-0 left-0 right-0 z-[100] flex items-center justify-between px-6 py-3 bg-white/80 backdrop-blur-lg shadow-sm border-b border-gray-200/50">
  <div
    routerLink="/"
    class="text-2xl font-extrabold tracking-tight text-navy cursor-pointer flex items-center gap-2"
    >
    <span class="text-orange">Acasă</span>
  </div>

  <div class="flex items-center gap-4">
    <a
      routerLink="/"
      [routerLinkActiveOptions]="{exact: true}"
      routerLinkActive="text-orange"
      class="px-3 py-1.5 text-sm font-semibold text-navy hover:text-orange transition-colors cursor-pointer"
      >
      Explorează
    </a>
    <a
      routerLink="/map"
      routerLinkActive="text-orange"
      class="px-3 py-1.5 text-sm font-semibold text-navy hover:text-orange transition-colors cursor-pointer"
      >
      Hartă
    </a>
    @if (isAuthenticated()) {
      <a
        routerLink="/add-property"
        routerLinkActive="text-orange"
        class="px-3 py-1.5 text-sm font-semibold text-navy hover:text-orange transition-colors cursor-pointer"
        >
        Adaugă anunț
      </a>

      <!-- User Profile Dropdown -->
      <div class="relative">
        <button
          (click)="toggleDropdown()"
          class="w-10 h-10 rounded-full bg-navy/5 flex items-center justify-center text-navy hover:bg-orange/10 hover:text-orange transition-all cursor-pointer border border-transparent hover:border-orange/20"
          >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
        </button>

        <!-- Dropdown Menu -->
        @if (isDropdownOpen()) {
          <div
            class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-xl border border-gray-100 py-2 z-[110]"
            (click)="$event.stopPropagation()"
            >
            <a
              routerLink="/contul-meu"
              (click)="closeDropdown()"
              class="flex items-center gap-2 px-4 py-2.5 text-sm font-medium text-navy hover:bg-orange/5 hover:text-orange transition-colors"
              >
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
              Contul meu
            </a>
            <div class="h-px bg-gray-100 my-1 mx-2"></div>
            <button
              (click)="logout()"
              class="w-full flex items-center gap-2 px-4 py-2.5 text-sm font-medium text-red-500 hover:bg-red-50 transition-colors"
              >
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
              </svg>
              Delogare
            </button>
          </div>
        }

        <!-- Overlay to close dropdown when clicking outside -->
        @if (isDropdownOpen()) {
          <div
            class="fixed inset-0 z-[-1]"
            (click)="closeDropdown()"
          ></div>
        }
      </div>
    } @else {
      <button
        disabled
        class="px-3 py-1.5 text-sm font-medium text-gray-400 cursor-not-allowed opacity-60"
        >
        Adaugă anunț
      </button>

      <a
        routerLink="/login"
        class="px-3 py-1.5 text-sm font-semibold text-navy hover:text-orange transition-colors cursor-pointer"
        >
        Autentificare
      </a>

      <a
        routerLink="/register"
        class="px-5 py-2 text-sm bg-navy text-white rounded-lg font-bold hover:bg-orange hover:shadow-md transition-all active:scale-95 cursor-pointer"
        >
        Creează cont
      </a>
    }
  </div>
</nav>
