<div [routerLink]="['/property', property.id]"
  class="bg-white rounded-2xl shadow-lg overflow-hidden border border-peach/20 hover:shadow-2xl transition-all cursor-pointer group">

  <div class="h-48 bg-gray-200 relative overflow-hidden">
    <img [src]="primaryImage" alt="{{ property.title }}"
      class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
    <div class="absolute top-4 right-4 bg-orange text-white px-3 py-1 rounded-full font-bold shadow-lg">
      {{ property.price | currency: "EUR" : "symbol" : "1.0-0" }}
    </div>
  </div>

  <div class="p-6 space-y-4 text-left">
    <h3 class="text-xl font-bold text-navy truncate group-hover:text-orange transition-colors">
      {{ property.title }}
    </h3>
    <p class="text-navy/60 text-sm line-clamp-2">{{ property.description }}</p>

    <div class="flex items-center gap-4 text-navy/80 font-medium">
      <div class="flex items-center gap-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-orange" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        {{ property.bedrooms }} camere
      </div>
      <div class="flex items-center gap-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-orange" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />
        </svg>
        {{ property.surfaceArea }} m²
      </div>
    </div>
  </div>

</div>
