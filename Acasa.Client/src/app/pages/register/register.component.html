<div class="min-h-screen flex items-center justify-center bg-light-gray px-4 py-12">
  <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-2xl space-y-8 border-4 border-peach/20">
    <div class="text-center">
      <h2 class="text-3xl font-extrabold text-navy">Creează-ți un cont</h2>
      <p class="text-navy/60 mt-2 font-medium">Începe să cauți locuința visurilor tale</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">
      <!-- Nume Complet -->
      <div class="space-y-1.5">
        <label class="text-xs font-bold uppercase tracking-wider text-navy/70 px-1">Nume Complet</label>
        <input 
          formControlName="name" 
          type="text" 
          placeholder="Popescu Ion"
          class="w-full h-12 px-4 rounded-xl bg-gray-50 border-2 border-transparent focus:border-orange focus:bg-white outline-none transition-all placeholder:text-gray-400"
        >
      </div>

      <!-- Email -->
      <div class="space-y-1.5">
        <label class="text-xs font-bold uppercase tracking-wider text-navy/70 px-1">Email</label>
        <input 
          formControlName="email" 
          type="email" 
          placeholder="nume@exemplu.ro"
          class="w-full h-12 px-4 rounded-xl bg-gray-50 border-2 border-transparent focus:border-orange focus:bg-white outline-none transition-all placeholder:text-gray-400"
        >
      </div>

      <!-- Parolă -->
      <div class="space-y-1.5">
        <label class="text-xs font-bold uppercase tracking-wider text-navy/70 px-1">Parolă</label>
        <input 
          formControlName="password" 
          type="password" 
          placeholder="••••••••"
          class="w-full h-12 px-4 rounded-xl bg-gray-50 border-2 border-transparent focus:border-orange focus:bg-white outline-none transition-all placeholder:text-gray-400"
        >
      </div>

      <!-- Confirmare Parolă -->
      <div class="space-y-1.5">
        <label class="text-xs font-bold uppercase tracking-wider text-navy/70 px-1">Confirmare Parolă</label>
        <input 
          formControlName="confirmPassword" 
          type="password" 
          placeholder="••••••••"
          class="w-full h-12 px-4 rounded-xl bg-gray-50 border-2 border-transparent focus:border-orange focus:bg-white outline-none transition-all placeholder:text-gray-400"
        >
        <div *ngIf="registerForm.hasError('mismatch') && registerGroup('confirmPassword').touched" class="text-red-500 text-xs mt-1 px-1">
          Parolele nu coincid!
        </div>
      </div>

      <button 
        type="submit" 
        [disabled]="registerForm.invalid"
        class="w-full h-14 bg-linear-to-r from-navy to-orange text-white rounded-xl font-bold text-lg hover:brightness-110 disabled:grayscale disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-lg active:scale-95"
      >
        Creează cont
      </button>
    </form>

    <div class="pt-6 text-center border-t border-gray-100 flex flex-col gap-3">
      <p class="text-navy/70 text-sm">
        Ai deja un cont? 
        <a routerLink="/login" class="text-orange font-bold hover:underline">Autentifică-te</a>
      </p>
      <a routerLink="/" class="text-navy/50 font-bold hover:text-navy text-sm transition-colors">
        ← Înapoi la început
      </a>
    </div>
  </div>
</div>
