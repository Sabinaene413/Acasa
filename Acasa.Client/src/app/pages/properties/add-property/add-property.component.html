<div class="min-h-screen flex flex-col bg-light-gray text-navy font-sans pt-[64px]">
  <app-navbar></app-navbar>

  <main class="flex-grow py-6 md:py-10 px-4">
    <div class="max-w-6xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border-4 border-peach/20">
      <div class="bg-navy p-5 md:p-6 text-white text-center">
        <h1 class="text-xl md:text-2xl font-extrabold tracking-tight">Adaugă un anunț nou</h1>
        <p class="text-white/70 mt-1 text-sm">Completează detaliile pentru a-ți publica proprietatea</p>
      </div>

      <form [formGroup]="propertyForm" (ngSubmit)="onSubmit()" class="p-5 md:p-8">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-12">
          <!-- Coloana Stângă: Detalii Textuale -->
          <div class="space-y-8">
            <!-- Informații de bază -->
            <div class="space-y-4">
              <h2 class="text-lg font-bold border-b-2 border-orange/30 pb-1.5 text-navy flex items-center gap-2">
                <span class="w-2 h-2 bg-orange rounded-full"></span>
                Informații Generale
              </h2>
              
              <div class="grid grid-cols-1 gap-4">
                <div class="space-y-1.5">
                  <label class="text-[11px] font-bold uppercase tracking-wider text-navy/70 px-1">Titlu Anunț</label>
                  <input 
                    formControlName="title" 
                    type="text" 
                    placeholder="Ex: Apartament 3 camere, zona centrală"
                    class="w-full h-11 px-4 rounded-xl bg-gray-50 border-2 border-transparent focus:border-orange focus:bg-white outline-none transition-all placeholder:text-gray-400 text-sm"
                  >
                </div>

                <div class="space-y-1.5">
                  <label class="text-[11px] font-bold uppercase tracking-wider text-navy/70 px-1">Descriere Detaliată</label>
                  <textarea 
                    formControlName="description" 
                    rows="4"
                    placeholder="Descrie proprietatea, facilitățile și zona..."
                    class="w-full p-4 rounded-xl bg-gray-50 border-2 border-transparent focus:border-orange focus:bg-white outline-none transition-all placeholder:text-gray-400 text-sm resize-none"
                  ></textarea>
                </div>

                <div class="space-y-1.5">
                  <label class="text-[11px] font-bold uppercase tracking-wider text-navy/70 px-1">Adresă Completă</label>
                  <input 
                    formControlName="address" 
                    type="text" 
                    placeholder="Strada, Număr, Oraș, Județ"
                    class="w-full h-11 px-4 rounded-xl bg-gray-50 border-2 border-transparent focus:border-orange focus:bg-white outline-none transition-all placeholder:text-gray-400 text-sm"
                  >
                </div>

                <div class="space-y-1.5">
                  <label class="text-[11px] font-bold uppercase tracking-wider text-navy/70 px-1">Oraș</label>
                  <select 
                    formControlName="cityId"
                    class="w-full h-11 px-4 rounded-xl bg-gray-50 border-2 border-transparent focus:border-orange focus:bg-white outline-none transition-all text-sm appearance-none cursor-pointer"
                  >
                    <option value="" disabled selected>Selectează un oraș</option>
                    <option *ngFor="let city of cities()" [value]="city.id">{{ city.name }}</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- Detalii Tehnice -->
            <div class="space-y-4">
              <h2 class="text-lg font-bold border-b-2 border-orange/30 pb-1.5 text-navy flex items-center gap-2">
                <span class="w-2 h-2 bg-orange rounded-full"></span>
                Detalii Tehnice & Preț
              </h2>
              
              <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1.5">
                  <label class="text-[11px] font-bold uppercase tracking-wider text-navy/70 px-1">Preț (€)</label>
                  <input 
                    formControlName="price" 
                    type="number" 
                    class="w-full h-11 px-4 rounded-xl bg-gray-50 border-2 border-transparent focus:border-orange focus:bg-white outline-none transition-all text-sm"
                  >
                </div>

                <div class="space-y-1.5">
                  <label class="text-[11px] font-bold uppercase tracking-wider text-navy/70 px-1">Suprafață (m²)</label>
                  <input 
                    formControlName="surfaceArea" 
                    type="number" 
                    class="w-full h-11 px-4 rounded-xl bg-gray-50 border-2 border-transparent focus:border-orange focus:bg-white outline-none transition-all text-sm"
                  >
                </div>

                <div class="space-y-1.5">
                  <label class="text-[11px] font-bold uppercase tracking-wider text-navy/70 px-1">Dormitoare</label>
                  <input 
                    formControlName="bedrooms" 
                    type="number" 
                    class="w-full h-11 px-4 rounded-xl bg-gray-50 border-2 border-transparent focus:border-orange focus:bg-white outline-none transition-all text-sm"
                  >
                </div>

                <div class="space-y-1.5">
                  <label class="text-[11px] font-bold uppercase tracking-wider text-navy/70 px-1">Băi</label>
                  <input 
                    formControlName="bathrooms" 
                    type="number" 
                    class="w-full h-11 px-4 rounded-xl bg-gray-50 border-2 border-transparent focus:border-orange focus:bg-white outline-none transition-all text-sm"
                  >
                </div>
              </div>
            </div>
          </div>

          <!-- Coloana Dreaptă: Imagini -->
          <div class="space-y-6 flex flex-col h-full">
            <h2 class="text-lg font-bold border-b-2 border-orange/30 pb-1.5 text-navy flex items-center gap-2">
              <span class="w-2 h-2 bg-orange rounded-full"></span>
              Galerie Imagini
            </h2>
            
            <div class="space-y-4 flex-grow">
              <div class="flex items-center justify-center w-full">
                <label class="flex flex-col items-center justify-center w-full h-40 lg:h-48 border-2 border-dashed border-navy/20 rounded-2xl cursor-pointer bg-gray-50 hover:bg-peach/10 transition-colors">
                  <div class="flex flex-col items-center justify-center pt-4 pb-4">
                    <svg class="w-8 h-8 mb-2 text-orange" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <p class="text-[11px] font-bold text-navy uppercase tracking-wide">Apasă pentru a încărca fotografii</p>
                    <p class="text-[10px] text-navy/50 mt-1">Format: JPG, PNG (max. 5MB)</p>
                  </div>
                  <input type="file" class="hidden" multiple (change)="onFileChange($event)" accept="image/*" />
                </label>
              </div>

              <div class="grid grid-cols-3 md:grid-cols-4 gap-3" *ngIf="previews().length > 0">
                <div *ngFor="let preview of previews(); let i = index" class="relative group aspect-square rounded-xl overflow-hidden shadow-sm border border-gray-100">
                  <img [src]="preview" class="w-full h-full object-cover">
                  <div class="absolute inset-0 bg-navy/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                    <button 
                      type="button"
                      (click)="removeImage(i)"
                      class="bg-red-500 text-white p-1.5 rounded-full hover:scale-110 transition-transform"
                    >
                      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                  </div>
                </div>
              </div>

              <div *ngIf="previews().length === 0" class="flex items-center justify-center h-48 bg-gray-50 rounded-2xl border-2 border-gray-100 border-dotted">
                <p class="text-navy/30 text-xs font-medium italic">Nicio imagine selectată încă</p>
              </div>
            </div>

            <!-- Butoane Acțiune (Poziționate la finalul coloanei drepte pe desktop) -->
            <div class="pt-8 mt-auto flex gap-4">
              <button 
                type="button"
                routerLink="/"
                class="flex-1 h-12 border-2 border-navy text-navy rounded-xl font-bold text-sm hover:bg-gray-50 transition-all active:scale-[0.98]"
              >
                Anulează
              </button>
              <button 
                type="submit" 
                [disabled]="propertyForm.invalid || isSubmitting()"
                class="flex-[2] h-12 bg-linear-to-r from-navy to-orange text-white rounded-xl font-bold text-sm md:text-base hover:brightness-110 disabled:grayscale disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-lg active:scale-[0.98]"
              >
                {{ isSubmitting() ? 'Se salvează...' : 'Publică Anunțul' }}
              </button>
            </div>
          </div>
        </div>
      </form>
    </div>
  </main>
</div>
