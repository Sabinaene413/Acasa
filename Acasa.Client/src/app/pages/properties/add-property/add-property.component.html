<div class="min-h-screen flex flex-col bg-light-gray text-navy font-sans">
  <app-navbar></app-navbar>

  <main class="flex-grow py-12 px-4">
    <div class="max-w-3xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border-4 border-peach/20">
      <div class="bg-navy p-8 text-white text-center">
        <h1 class="text-3xl font-extrabold tracking-tight">Adaugă un anunț nou</h1>
        <p class="text-white/70 mt-2">Completează detaliile pentru a-ți publica proprietatea</p>
      </div>

      <form [formGroup]="propertyForm" (ngSubmit)="onSubmit()" class="p-8 space-y-8">
        <!-- Informații de bază -->
        <div class="space-y-6">
          <h2 class="text-xl font-bold border-b-2 border-orange pb-2 text-navy">Informații Generale</h2>
          
          <div class="grid grid-cols-1 gap-6">
            <div class="space-y-2">
              <label class="text-sm font-bold text-navy px-1 uppercase tracking-wider">Titlu Anunț</label>
              <input 
                formControlName="title" 
                type="text" 
                placeholder="Ex: Apartament 3 camere, zona centrală"
                class="w-full h-12 px-4 rounded-xl bg-gray-50 border-2 border-transparent focus:border-orange focus:bg-white outline-none transition-all placeholder:text-gray-400"
              >
            </div>

            <div class="space-y-2">
              <label class="text-sm font-bold text-navy px-1 uppercase tracking-wider">Descriere Detaliată</label>
              <textarea 
                formControlName="description" 
                rows="4"
                placeholder="Descrie proprietatea, facilitățile și zona..."
                class="w-full p-4 rounded-xl bg-gray-50 border-2 border-transparent focus:border-orange focus:bg-white outline-none transition-all placeholder:text-gray-400"
              ></textarea>
            </div>

            <div class="space-y-2">
              <label class="text-sm font-bold text-navy px-1 uppercase tracking-wider">Adresă Completă</label>
              <input 
                formControlName="address" 
                type="text" 
                placeholder="Strada, Număr, Oraș, Județ"
                class="w-full h-12 px-4 rounded-xl bg-gray-50 border-2 border-transparent focus:border-orange focus:bg-white outline-none transition-all placeholder:text-gray-400"
              >
            </div>
          </div>
        </div>

        <!-- Detalii Tehnice -->
        <div class="space-y-6">
          <h2 class="text-xl font-bold border-b-2 border-orange pb-2 text-navy">Detalii Tehnice & Preț</h2>
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
              <label class="text-sm font-bold text-navy px-1 uppercase tracking-wider">Preț (€)</label>
              <input 
                formControlName="price" 
                type="number" 
                class="w-full h-12 px-4 rounded-xl bg-gray-50 border-2 border-transparent focus:border-orange focus:bg-white outline-none transition-all"
              >
            </div>

            <div class="space-y-2">
              <label class="text-sm font-bold text-navy px-1 uppercase tracking-wider">Suprafață (m²)</label>
              <input 
                formControlName="surfaceArea" 
                type="number" 
                class="w-full h-12 px-4 rounded-xl bg-gray-50 border-2 border-transparent focus:border-orange focus:bg-white outline-none transition-all"
              >
            </div>

            <div class="space-y-2">
              <label class="text-sm font-bold text-navy px-1 uppercase tracking-wider">Dormitoare</label>
              <input 
                formControlName="bedrooms" 
                type="number" 
                class="w-full h-12 px-4 rounded-xl bg-gray-50 border-2 border-transparent focus:border-orange focus:bg-white outline-none transition-all"
              >
            </div>

            <div class="space-y-2">
              <label class="text-sm font-bold text-navy px-1 uppercase tracking-wider">Băi</label>
              <input 
                formControlName="bathrooms" 
                type="number" 
                class="w-full h-12 px-4 rounded-xl bg-gray-50 border-2 border-transparent focus:border-orange focus:bg-white outline-none transition-all"
              >
            </div>
          </div>
        </div>

        <!-- Imagini -->
        <div class="space-y-6">
          <h2 class="text-xl font-bold border-b-2 border-orange pb-2 text-navy">Galerie Imagini</h2>
          
          <div class="space-y-4">
            <div class="flex items-center justify-center w-full">
              <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-navy/20 rounded-2xl cursor-pointer bg-gray-50 hover:bg-peach/10 transition-colors">
                <div class="flex flex-col items-center justify-center pt-5 pb-6">
                  <svg class="w-8 h-8 mb-4 text-orange" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                  <p class="text-sm font-bold text-navy">Apasă pentru a încărca fotografii</p>
                </div>
                <input type="file" class="hidden" multiple (change)="onFileChange($event)" accept="image/*" />
              </label>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-4" *ngIf="previews().length > 0">
              <div *ngFor="let preview of previews(); let i = index" class="relative group aspect-square rounded-xl overflow-hidden shadow-md">
                <img [src]="preview" class="w-full h-full object-cover">
                <button 
                  type="button"
                  (click)="removeImage(i)"
                  class="absolute top-2 right-2 bg-red-500 text-white p-1.5 rounded-full opacity-0 group-hover:opacity-100 transition-opacity"
                >
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="pt-8 border-t border-gray-100 flex gap-4">
          <button 
            type="button"
            routerLink="/"
            class="flex-grow h-14 border-2 border-navy text-navy rounded-xl font-bold text-lg hover:bg-gray-50 transition-all active:scale-95"
          >
            Anulează
          </button>
          <button 
            type="submit" 
            [disabled]="propertyForm.invalid || isSubmitting()"
            class="flex-[2] h-14 bg-orange text-white rounded-xl font-bold text-lg hover:brightness-110 disabled:bg-gray-200 disabled:text-gray-400 disabled:cursor-not-allowed transition-all shadow-lg active:scale-95"
          >
            {{ isSubmitting() ? 'Se salvează...' : 'Publică Anunțul' }}
          </button>
        </div>
      </form>
    </div>
  </main>
</div>
